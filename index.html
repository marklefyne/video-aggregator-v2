<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORN TO STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .v-card { background: #0a0a0a; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; border-radius: 8px; overflow: hidden; }
        .v-card:hover { border-color: red; }
        .player { display:none; position:fixed; inset:0; background: #000; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="p-5">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black italic text-red-600">BORN<span class="text-white">TO</span></h1>
        <div class="flex gap-4">
            <button onclick="loadContent('trending')" class="text-xs font-bold uppercase border-b-2 border-red-600">Trending</button>
            <button onclick="loadContent('new')" class="text-xs font-bold uppercase text-gray-500 hover:text-white">Newest</button>
        </div>
    </div>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <div class="col-span-full text-center py-20 text-gray-600 font-bold uppercase animate-pulse">
            טוען סרטונים... אם לא נטען תוך 5 שניות, כבה AdBlock
        </div>
    </div>
</div>

<div id="player" class="player">
    <div class="p-4 flex justify-between bg-zinc-900 items-center">
        <button onclick="closeP()" class="bg-red-600 px-4 py-1 rounded font-black text-xs">CLOSE X</button>
    </div>
    <div class="w-full h-full relative">
        <div id="shield" class="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center cursor-pointer" onclick="openPop()">
            <div class="bg-red-600 px-10 py-4 rounded-full font-black text-sm uppercase mb-2">Unlock Video</div>
        </div>
        <iframe id="frame" src=""></iframe>
    </div>
</div>

<script>
    let clicks = 0;
    const pops = ["https://www.profitablecpmratenetwork.com/uquv8zzw?key=08ac4178b82923bddd5e0782a47223ab"];

    async function loadContent(query) {
        const grid = document.getElementById('grid');
        // שימוש ב-Proxy כדי לעקוף חסימות דפדפן
        const proxyUrl = 'https://api.allorigins.win/get?url=';
        const apiUrl = encodeURIComponent(`https://www.eporner.com/api/v2/video/search/?query=${query}&per_page=20`);

        try {
            const r = await fetch(proxyUrl + apiUrl);
            const data = await r.json();
            const d = JSON.parse(data.contents); // פיענוח הנתונים מה-Proxy
            
            grid.innerHTML = '';
            d.videos.forEach(v => {
                grid.innerHTML += `
                    <div class="v-card" onclick="playV('${v.id}')">
                        <img src="${v.default_thumb.src}" class="w-full aspect-video object-cover">
                        <div class="p-2 text-[10px] font-bold text-gray-500 truncate uppercase">${v.title}</div>
                    </div>
                `;
            });
        } catch(e) {
            grid.innerHTML = `<div class="col-span-full text-center text-red-500">שגיאת חיבור. נסה לרענן או לכבות חוסם פרסומות.</div>`;
        }
    }

    function playV(id) {
        clicks = 0;
        document.getElementById('player').style.display = 'block';
        document.getElementById('shield').style.display = 'flex';
        document.getElementById('frame').src = `https://www.eporner.com/embed/${id}/`;
    }

    function openPop() {
        window.open(pops[0], '_blank');
        clicks++;
        if(clicks >= 2) document.getElementById('shield').style.display = 'none';
    }

    function closeP() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('frame').src = '';
    }

    loadContent('trending');
</script>

</body>
</html>
